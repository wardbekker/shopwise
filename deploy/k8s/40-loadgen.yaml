apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  namespace: shop
  labels:
    app: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen
  template:
    metadata:
      labels:
        app: loadgen
    spec:
      containers:
        - name: loadgen
          image: webinar-demo/loadgen:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: FRONTEND_URL
              value: http://frontend.shop:8080
            - name: USERS
              value: "5"
            - name: RPS
              value: "2"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
