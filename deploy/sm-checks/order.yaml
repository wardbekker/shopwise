apiVersion: syntheticmonitoring.ext.grafana.app/v1alpha1
kind: Check
metadata:
  name: "webshop-order-74162"
spec:
  job: webshop-order
  target: http://order.shop.svc.cluster.local:8085/healthz
  enabled: true
  frequency: 60000
  timeout: 5000
  probes:
    - private probe
  labels:
    - name: app
      value: webshop
    - name: service
      value: order
  settings:
    http:
      method: GET
      validStatusCodes:
        - 200
