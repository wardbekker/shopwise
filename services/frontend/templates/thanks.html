<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Thank you - Shopwise</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7f8; color: #222; }
header { background: #1f2937; color: #fff; padding: 16px 24px; }
header h1 { margin: 0; font-size: 1.4rem; }
main { max-width: 640px; margin: 40px auto; padding: 32px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; text-align: center; }
main h2 { color: #16a34a; }
.order { color: #555; margin: 16px 0; }
a.button { display: inline-block; background: #2563eb; color: #fff; text-decoration: none; padding: 10px 18px; border-radius: 6px; }
</style>
</head>
<body>
<header><h1>Shopwise</h1></header>
<main>
  <h2>Thanks for your order!</h2>
  <p class="order">Order <strong>{{.Order}}</strong> placed. Total: <strong>${{.Total}}</strong></p>
  <a class="button" href="/">Keep shopping</a>
</main>
</body>
</html>
