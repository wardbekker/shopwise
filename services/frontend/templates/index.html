<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shopwise</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7f8; color: #222; }
header { background: #1f2937; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
header h1 { margin: 0; font-size: 1.4rem; }
header a { color: #fff; text-decoration: none; background: #374151; padding: 8px 14px; border-radius: 6px; }
main { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; display: flex; flex-direction: column; }
.card h3 { margin: 0 0 8px; font-size: 1.05rem; }
.card p { color: #555; flex: 1; font-size: 0.9rem; }
.price { font-weight: 700; margin: 8px 0; }
button { background: #2563eb; color: #fff; border: 0; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<header>
  <h1>Shopwise</h1>
  <a href="/cart">Cart ({{.CartCount}})</a>
</header>
<main>
  <div class="grid">
    {{range .Products}}
    <div class="card">
      <h3>{{.Name}}</h3>
      <p>{{.Description}}</p>
      <div class="price">{{formatPrice .Price}}</div>
      <form method="post" action="/cart/add">
        <input type="hidden" name="product_id" value="{{.ID}}">
        <input type="hidden" name="quantity" value="1">
        <button type="submit">Add to cart</button>
      </form>
    </div>
    {{end}}
  </div>
</main>
</body>
</html>
