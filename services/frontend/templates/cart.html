<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cart - Shopwise</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7f8; color: #222; }
header { background: #1f2937; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
header h1 { margin: 0; font-size: 1.4rem; }
header a { color: #fff; text-decoration: none; background: #374151; padding: 8px 14px; border-radius: 6px; }
main { max-width: 800px; margin: 24px auto; padding: 0 16px; }
table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f1f5f9; }
th { background: #f8fafc; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
tr:last-child td { border-bottom: 0; }
.total { margin-top: 16px; font-size: 1.2rem; font-weight: 700; text-align: right; }
.actions { margin-top: 16px; text-align: right; }
button { background: #16a34a; color: #fff; border: 0; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
button:hover { background: #15803d; }
.empty { text-align: center; padding: 40px; color: #6b7280; }
</style>
</head>
<body>
<header>
  <h1>Shopwise</h1>
  <a href="/">Continue shopping</a>
</header>
<main>
  <h2>Your cart</h2>
  {{if .Items}}
  <table>
    <thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Subtotal</th></tr></thead>
    <tbody>
    {{range .Items}}
      <tr>
        <td>{{.Product.Name}}</td>
        <td>{{formatPrice .Product.Price}}</td>
        <td>{{.Quantity}}</td>
        <td>{{formatPrice .Subtotal}}</td>
      </tr>
    {{end}}
    </tbody>
  </table>
  <div class="total">Total: {{formatPrice .Total}}</div>
  <div class="actions">
    <form method="post" action="/checkout">
      <button type="submit">Checkout</button>
    </form>
  </div>
  {{else}}
  <div class="empty">Your cart is empty. <a href="/">Browse products</a>.</div>
  {{end}}
</main>
</body>
</html>
