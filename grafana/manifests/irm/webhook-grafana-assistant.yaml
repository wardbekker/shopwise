# Outgoing webhook that auto-triggers a Grafana Assistant Investigation whenever
# an IRM incident is created or changes. The `grafana_assistant` preset routes
# the payload to the Assistant's `from-irm-incident` endpoint, which creates an
# Investigation attached to the incident.
#
# Pair this with:
#   - An OnCall non-default route + `declare_incident` escalation step (so an
#     alert auto-declares an incident — see PROVISIONED.md for IDs)
#   - The `grafana_assistant` preset (locks `url` and `http_method`; do not send
#     them in the create payload).
#
# Note: trigger_type=11 ("Incident Declared") is the create-time trigger.
# trigger_type=12 ("Incident Changed") does NOT fire on initial creation —
# verified empirically against this stack; it only fires on subsequent updates.
# integration_filter is left empty here (forwards on any incident).
#
# Apply via:
#   gcx api /api/plugins/grafana-irm-app/resources/webhooks/ \
#     -X POST -H 'Content-Type: application/json' \
#     -d '{"name":"Grafana Assistant - Incidents - incident declared","preset":"grafana_assistant","trigger_type":"11","is_webhook_enabled":true}'
name: Grafana Assistant - Incidents - incident declared
preset: grafana_assistant
trigger_type: "11"       # 11 = Incident Declared (fires on initial creation). Use 12 (Incident Changed) only if you specifically want update events; it does NOT fire on initial declare.
is_webhook_enabled: true
integration_filter: []   # webhook fires on any incident regardless of source integration
